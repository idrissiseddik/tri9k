<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>طريقك - قريباً</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: #0b0b0b;
            color: #eaeaea;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 18px 80px;
            margin: 0;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ---------- ICÔNE APP ---------- */
        .app-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, #2E7D32, #1b5e20);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: #fff;
            margin: 0 auto 14px;
            box-shadow: 0 10px 28px rgba(46, 125, 50, 0.25);
            animation: softPulse 3s infinite ease-in-out;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        h1 i {
            color: #2E7D32;
        }

        .tagline {
            color: #888;
            font-size: 1rem;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 18px;
        }

        /* ---------- TITRE "BIENTÔT" ---------- */
        .big-icon {
            font-size: 3.6rem;
            color: #2E7D32;
            opacity: 0.6;
            display: block;
            margin-bottom: 6px;
        }

        .soon-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        .soon-title span {
            color: #2E7D32;
        }

        .sub-text {
            color: #999;
            font-size: 0.95rem;
            margin: 10px 0 28px;
            line-height: 1.7;
        }

        /* ---------- SITE UNIQUE (UN SEUL À LA FOIS) ---------- */
        .sites-section {
            margin-top: 12px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .sites-label {
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 16px;
        }
        .sites-label i {
            color: #2E7D32;
            margin: 0 6px;
        }

        .site-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60px;
            position: relative;
        }

        /* ---- un seul site affiché à la fois ---- */
        .site-item {
            background: transparent;
            padding: 8px 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: #b0b0b0;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.25s ease, transform 0.25s ease;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.04);
            padding-bottom: 4px;
            opacity: 0;
            animation-duration: 0.8s;
            animation-timing-function: ease;
            animation-fill-mode: forwards;
            position: absolute;
        }

        .site-item i {
            color: #2E7D32;
            font-size: 0.8rem;
            transition: color 0.25s;
        }

        .site-item:hover {
            color: #fff;
            transform: translateY(-2px) scale(1.02);
        }
        .site-item:hover i {
            color: #4caf50;
        }

        /* ----- ANIMATIONS INDIVIDUELLES ----- */
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.92); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes zoomIn {
            0% { opacity: 0; transform: scale(0.4); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideLeft {
            0% { opacity: 0; transform: translateX(30px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideRight {
            0% { opacity: 0; transform: translateX(-30px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.8; transform: scale(1.15); }
            70% { transform: scale(0.92); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes flipIn {
            0% { opacity: 0; transform: perspective(400px) rotateY(90deg); }
            100% { opacity: 1; transform: perspective(400px) rotateY(0); }
        }
        @keyframes rotateIn {
            0% { opacity: 0; transform: rotate(-180deg) scale(0.4); }
            100% { opacity: 1; transform: rotate(0) scale(1); }
        }
        @keyframes pulseGlow {
            0% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.08); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ---------- FOOTER FIXE ---------- */
        .credit-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0b0b0b;
            font-size: 0.7rem;
            color: #444;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding: 14px 18px;
            z-index: 100;
        }
        .credit-footer strong {
            color: #2E7D32;
            font-weight: 600;
        }
        .credit-footer i {
            color: #2E7D32;
            margin: 0 4px;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 420px) {
            h1 { font-size: 1.9rem; }
            .site-item { font-size: 0.95rem; }
            .wrapper { padding: 0 4px; }
            body { padding: 24px 12px 80px; }
        }

        @keyframes softPulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="wrapper">

        <!-- ICÔNE & TITRE -->
        <div class="app-icon">
            <i class="fas fa-taxi"></i>
        </div>
        <h1><i class="fas fa-route"></i> طريقك</h1>
        <div class="tagline">Marrakech • طلب رحلات داخلية</div>

        <!-- TEXTE PRINCIPAL -->
        <span class="big-icon"><i class="fas fa-clock"></i></span>
        <div class="soon-title">قريباً <span>جداً</span></div>
        <p class="sub-text">
            طلب رحلات داخل مراكش بسهولة<br />
            نعمل على إطلاق المنصة بأفضل شكل لتكون في خدمتك
        </p>

        <!-- SITE UNIQUE : UN SEUL SITE APPARAÎT À LA FOIS -->
        <div class="sites-section">
            <span class="sites-label">
                <i class="fas fa-handshake"></i> مواقع صديقة <i class="fas fa-handshake"></i>
            </span>
            <div class="site-container" id="siteContainer">
                <!-- les sites seront générés ici mais un seul visible à la fois -->
            </div>
        </div>

    </div>

    <!-- FOOTER FIXE -->
    <div class="credit-footer">
        <i class="fas fa-code"></i> Créé par : <strong>M.Seddik ELidrissi</strong>
    </div>

    <script>
        // ----- LISTE DES SITES (nom + lien) -----
        const sites = [
            { name: 'راديو القرآن الكريم', url: 'https://radiocoran.vercel.app' },
            { name: 'تلاوة و حفظ القرآن الكريم', url: 'https://tilawatquran.vercel.app' },
            { name: 'آية اليوم للتدبر و التذكير اليومي', url: 'https://ayatoday.vercel.app' },
            { name: 'منصة فضاء المعرفة', url: 'https://svque.vercel.app' },
            { name: 'إذاعات عالمية بين يديك في مكان واحد', url: 'https://worldradios.vercel.app' },
            { name: 'نكت مغربية ضحك و ترفيه بلا حدود', url: 'https://nokatapp.vercel.app' },
        ];

        const container = document.getElementById('siteContainer');
        let currentIndex = 0;

        // Créer tous les éléments et les cacher
        sites.forEach((site, index) => {
            const link = document.createElement('a');
            link.href = site.url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.className = 'site-item';
            link.innerHTML = `<i class="fas fa-external-link-alt"></i> ${site.name}`;
            link.style.display = 'none';
            link.dataset.index = index;
            container.appendChild(link);
        });

        // Fonction pour afficher un site avec son animation
        function showSite(index) {
            const items = container.querySelectorAll('.site-item');
            // Cacher tous les sites
            items.forEach(item => {
                item.style.display = 'none';
                item.style.opacity = '0';
                item.style.animation = 'none';
                void item.offsetHeight;
            });

            const currentItem = items[index];
            if (!currentItem) return;

            const animations = ['fadeIn', 'zoomIn', 'slideUp', 'slideLeft', 'bounceIn', 'flipIn', 'rotateIn', 'pulseGlow', 'slideDown'];
            const animName = animations[index % animations.length];

            currentItem.style.display = 'inline-flex';
            currentItem.style.animation = `${animName} 0.8s ease forwards`;
            currentItem.style.opacity = '0';

            setTimeout(() => {
                const nextIndex = (index + 1) % sites.length;
                showSite(nextIndex);
            }, 3000);
        }

        setTimeout(() => {
            showSite(0);
        }, 500);
    </script>

</body>
</html>
